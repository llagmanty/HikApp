name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        run: xcodebuild build -scheme HikApp -destination 'platform=iOS Simulator,name=iPhone 16'

      - name: Test
        run: xcodebuild test -scheme HikApp -destination 'platform=iOS Simulator,name=iPhone 16'
